<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#f2f2f7;color:#1d1d1f;-webkit-font-smoothing:antialiased}
:root{--blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de;--gray:#86868b;--card:#fff;--sep:rgba(60,60,67,.12)}

/* ── tabs ── */
.tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:99;border-bottom:.5px solid var(--sep);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 15px;border-radius:980px;border:none;background:#e5e5ea;color:var(--gray);font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
.tab.active{background:var(--blue);color:#fff}

/* ── route bar ── */
.route-bar{background:var(--card);border-radius:12px;padding:12px 14px;margin:0 14px 10px;font-size:13px;color:var(--gray);line-height:1.8;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.route-bar strong{color:#1d1d1f}

/* ── map canvas ── */
.map-wrap{position:relative;margin:0 14px 10px;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.10)}
canvas{display:block;width:100%;background:#e8f0e8}

/* ── content ── */
.content{max-width:680px;margin:0 auto;padding:0 0 40px}
.hero{text-align:center;padding:20px 16px 10px}
.hero h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
.hero p{font-size:15px;color:var(--gray);margin-top:4px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 14px}
.ic{background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ic .lbl{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.ic .val{font-size:14px;font-weight:600;line-height:1.4}
.sec{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;padding:14px 14px 6px}
.day-head{padding:14px 14px 8px}
.day-head h2{font-size:21px;font-weight:700;letter-spacing:-.02em}
.day-head p{font-size:14px;color:var(--gray);margin-top:2px}

/* ── timeline ── */
.tl{position:relative;padding:0 14px 0 38px}
.tl::before{content:'';position:absolute;left:27px;top:12px;bottom:12px;width:1.5px;background:var(--sep)}
.tl-item{position:relative;margin-bottom:8px}
.tl-dot{position:absolute;left:-17px;top:16px;width:10px;height:10px;border-radius:50%;border:2px solid #f2f2f7}
.card{background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.card:active{opacity:.85}
.card .tm{font-size:11px;font-weight:600;color:#aeaeb2;letter-spacing:.02em}
.card .nm{font-size:16px;font-weight:600;margin:2px 0 4px;display:flex;align-items:center;gap:6px}
.card .ds{font-size:13px;color:var(--gray);line-height:1.5}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
.b-food{background:rgba(255,59,48,.1);color:var(--red)}
.b-spot{background:rgba(0,122,255,.1);color:var(--blue)}
.b-hotel{background:rgba(255,149,0,.1);color:var(--orange)}
.bgt{display:inline-block;margin-top:5px;padding:2px 8px;background:#f2f2f7;border-radius:6px;font-size:12px;color:var(--gray);font-weight:500}
.detail{display:none;margin-top:8px;padding-top:8px;border-top:.5px solid var(--sep);font-size:12px;color:var(--gray);line-height:1.7;white-space:pre-line}
.detail.open{display:block}

/* ── buttons ── */
.btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:3px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent}
.btn-nav{background:var(--blue);color:#fff}
.btn-xhs{background:#ff2442;color:#fff}
.btn-dp{background:#ffa700;color:#fff}

/* ── tips ── */

.lg{display:flex;align-items:center;gap:5px}
.lg-dot{width:8px;height:8px;border-radius:50%}

/* ── action sheet ── */

// ══════════ 地图（纯 Canvas，离线可用）══════════
function buildMap(dayId){
  const wrap = document.createElement('div');
  wrap.className = 'map-wrap';

  // 收集所有点
  let pts = [];
  if(dayId===0){ DAYS.forEach(d=>d.locs.forEach(l=>{ if(l.lat) pts.push({...l,color:d.color,dayLabel:d.label}); })); }
  else { const d=DAYS.find(x=>x.id===dayId); if(d) pts=d.locs.filter(l=>l.lat).map(l=>({...l,color:d.color})); }
  if(!pts.length){ wrap.style.display='none'; return wrap; }

  const W=680, H=220;
  const canvas=document.createElement('canvas');
  canvas.width=W*2; canvas.height=H*2;
  canvas.style.height=H+'px';
  wrap.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);

  // 计算 bbox
  const lats=pts.map(p=>p.lat), lngs=pts.map(p=>p.lng);
  let minLat=Math.min(...lats),maxLat=Math.max(...lats),minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  const padFrac=0.12;
  const dLat=(maxLat-minLat)||0.05, dLng=(maxLng-minLng)||0.05;
  minLat-=dLat*padFrac; maxLat+=dLat*padFrac;
  minLng-=dLng*padFrac; maxLng+=dLng*padFrac;

  function proj(lat,lng){
    const x=(lng-minLng)/(maxLng-minLng)*(W-20)+10;
    const y=(maxLat-lat)/(maxLat-minLat)*(H-20)+10;
    return [x,y];
  }

  // 背景
  ctx.fillStyle='#eef2ee'; ctx.fillRect(0,0,W,H);
  // 网格线
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1;
  for(let i=0;i<5;i++){ const y=i*(H/4); ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  for(let i=0;i<9;i++){ const x=i*(W/8); ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }

  // 折线
  if(dayId!==0 && pts.length>1){
    const day=DAYS.find(x=>x.id===dayId);
    ctx.beginPath(); ctx.setLineDash([5,4]);
    ctx.strokeStyle=day?day.color+'99':'#aaa'; ctx.lineWidth=1.8;
    const [x0,y0]=proj(pts[0].lat,pts[0].lng); ctx.moveTo(x0,y0);
    pts.forEach(p=>{ const [x,y]=proj(p.lat,p.lng); ctx.lineTo(x,y); });
    ctx.stroke(); ctx.setLineDash([]);
  }

  // 标记点
  pts.forEach((p,i)=>{
    const [x,y]=proj(p.lat,p.lng);
    // 光晕
    ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2);
    ctx.fillStyle=p.color+'22'; ctx.fill();
    // 圆
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    // 序号
    ctx.fillStyle='#fff'; ctx.font='bold 8px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i+1,x,y);
    // label
    ctx.fillStyle='#333'; ctx.font='500 10px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    const label=p.name.length>7?p.name.slice(0,6)+'…':p.name;
    ctx.fillText(label,x,y+10);
  });

  // 小标题
  if(dayId===0){
    ctx.fillStyle='rgba(0,0,0,.35)'; ctx.font='500 11px -apple-system,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('全程路线概览',8,6);
  }

  return wrap;
}

// ══════════ 渲染卡片 ══════════
const TYPE_COLOR={food:'--red',spot:'--blue',hotel:'--orange',transport:'--gray',drink:'--purple'};
const BADGE={food:'<span class="badge b-food">餐</span>',spot:'<span class="badge b-spot">景</span>',hotel:'<span class="badge b-hotel">住</span>'};

function card(loc,dayIdx){
  const uid='c'+Math.random().toString(36).slice(2);
  const dot=TYPE_COLOR[loc.type]||'--gray';
  const bdg=BADGE[loc.type]||'';
  const gmapUrl=loc.gmap?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.gmap)}`:'';
  const amapUrl=loc.lat?`https://uri.amap.com/marker?position=${loc.lng},${loc.lat}&name=${encodeURIComponent(loc.name)}&coordinate=wgs84&callnative=1`:'';

  let btns='';
  if(loc.lat){
    btns+=`<button class="btn btn-nav" onclick="openAS('${loc.name.replace(/'/g,"\\'")}','${gmapUrl}','${amapUrl}')">📍 导航</button>`;
  }
  if(loc.xhs){
    const url=`https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(loc.xhs)}&source=web_explore_feed`;
    btns+=`<a href="${url}" target="_blank" class="btn btn-xhs">📕 小红书</a>`;
  }
  if(loc.dp){
    const url=`https://m.dianping.com/searchshop?keyword=${encodeURIComponent(loc.dp)}`;
    btns+=`<a href="${url}" target="_blank" class="btn btn-dp">🍜 大众点评</a>`;
  }

  return `<div class="tl-item">
    <div class="tl-dot" style="background:var(${dot})"></div>
    <div class="card" onclick="toggle('${uid}')">
      <div class="tm">${loc.time}</div>
      <div class="nm">${bdg} ${loc.emoji||''} ${loc.name}</div>
      <div class="ds">${loc.desc}</div>
      ${loc.budget?`<div class="bgt">${loc.budget}</div>`:''}
      ${btns?`<div class="btns" onclick="event.stopPropagation()">${btns}</div>`:''}
      ${loc.detail?`<div class="detail" id="${uid}">${loc.detail}</div>`:''}
    </div>
  </div>`;
}

  <div class="tip"><h4>👟 装备清单</h4>防晒霜、雨衣（山区天气多变）、换洗衣服（峡谷玩水必湿）、防滑凉鞋、薄外套（山顶凉）。</div>

function dayHTML(d){
  return `
  <div class="day-head"><h2>${d.title}</h2><p>${d.date}</p></div>
  <div class="route-bar">${d.route||''}</div>
  <div class="sec">行程</div>
  <div class="tl">${d.locs.map((l,i)=>card(l,d.id)).join('')}</div>`;
}

// ══════════ 交互 ══════════
let cur=0;
const tabsEl=document.getElementById('tabs');
const contentEl=document.getElementById('content');

DAYS.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='tab'+(d.id===0?' active':'');
  btn.dataset.day=d.id; btn.textContent=d.label;
  tabsEl.appendChild(btn);
});
tabsEl.addEventListener('click',e=>{ const t=e.target.closest('.tab'); if(t) go(+t.dataset.day); });

function go(idx){
  cur=idx;
  tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',+t.dataset.day===idx));
  const d=DAYS.find(x=>x.id===idx);

  // 清空并插入地图
  contentEl.innerHTML='';
  const mapEl=buildMap(idx);
  contentEl.appendChild(mapEl);

  // 插入文字内容
  const text=document.createElement('div');
  text.innerHTML=idx===0?overviewHTML():dayHTML(d);
  contentEl.appendChild(text);

  window.scrollTo({top:0,behavior:'smooth'});
  const tab=tabsEl.querySelector(`[data-day="${idx}"]`);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function toggle(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

// ══════════ Action Sheet 导航 ══════════
const overlay=document.getElementById('overlay');
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeAS(); });

function openAS(name,gmapUrl,amapUrl){
  const appleUrl=`https://maps.apple.com/?q=${encodeURIComponent(name)}`;
  document.getElementById('as-opts').innerHTML=
    `<button class="si" onclick="window.open('${appleUrl}');closeAS()">🍎 Apple Maps</button>`+
    (gmapUrl?`<button class="si" onclick="window.open('${gmapUrl}');closeAS()">🗺️ Google Maps</button>`:'')+
    (amapUrl?`<button class="si" onclick="window.open('${amapUrl}');closeAS()">🧭 高德地图</button>`:'');
  overlay.classList.add('show');
}
function closeAS(){ overlay.classList.remove('show'); }

go(0);
</script>

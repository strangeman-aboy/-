<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州→安吉 竹海峡谷四日游</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#f2f2f7;color:#1d1d1f;-webkit-font-smoothing:antialiased;font-size:15px}
:root{
  --blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de;--teal:#30b0c7;
  --gray:#86868b;--gray2:#aeaeb2;--gray3:#e5e5ea;--gray4:#f2f2f7;
  --card:#fff;--sep:rgba(60,60,67,.12);
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.10);
}

/* ─── cover ─── */
.cover{
  background:linear-gradient(160deg,#1a3a2a 0%,#2d5a3d 40%,#1e4a5a 100%);
  padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;
}
.cover::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.cover-emoji{font-size:48px;margin-bottom:12px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.cover h1{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.cover .sub{font-size:14px;color:rgba(255,255,255,.7);margin-top:8px;letter-spacing:.02em}
.cover-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.cover-pill{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:980px;border:.5px solid rgba(255,255,255,.2)}

/* ─── tabs ─── */
.tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;
  background:rgba(255,255,255,.94);backdrop-filter:saturate(180%) blur(20px);
  position:sticky;top:0;z-index:99;border-bottom:.5px solid var(--sep);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:980px;border:none;
  background:var(--gray3);color:var(--gray);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;white-space:nowrap;letter-spacing:-.01em}
.tab.active{color:#fff}

/* ─── layout ─── */
.page{max-width:680px;margin:0 auto;padding-bottom:48px}

/* ─── canvas map ─── */
.map-wrap{margin:0 14px 12px;border-radius:16px;overflow:hidden;box-shadow:var(--sh2);position:relative}
canvas{display:block;width:100%}
.map-legend{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);border-radius:8px;padding:5px 8px;
  font-size:10px;color:#555;line-height:1.8}
.map-legend span{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* ─── section header ─── */
.sec{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;
  letter-spacing:.06em;padding:16px 14px 6px}

/* ─── day header ─── */
.day-intro{margin:0 14px 10px;background:var(--card);border-radius:16px;
  overflow:hidden;box-shadow:var(--sh)}
.day-intro-top{padding:16px 16px 12px;border-bottom:.5px solid var(--sep)}
.day-intro-top h2{font-size:22px;font-weight:800;letter-spacing:-.02em}
.day-intro-top .date{font-size:13px;color:var(--gray);margin-top:3px}
.day-intro-route{padding:10px 16px;font-size:13px;color:var(--gray);line-height:1.8;display:flex;align-items:flex-start;gap:8px}
.day-intro-route .icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* ─── timeline ─── */
.tl{position:relative;padding:0 14px 0 44px}
.tl::before{content:'';position:absolute;left:30px;top:8px;bottom:8px;width:1.5px;background:linear-gradient(to bottom,transparent,var(--sep) 8%,var(--sep) 92%,transparent)}
.tl-item{position:relative;margin-bottom:10px}
.tl-dot{position:absolute;left:-20px;top:18px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--gray4);z-index:1}

/* ─── card ─── */
.card{background:var(--card);border-radius:14px;box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.card:active{box-shadow:var(--sh2)}
.card-top{padding:13px 14px 11px}
.card-time{font-size:11px;font-weight:700;color:var(--gray2);letter-spacing:.04em;margin-bottom:3px}
.card-name{font-size:16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.card-desc{font-size:13px;color:var(--gray);line-height:1.55;margin-top:5px}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.02em}
.b-food{background:rgba(255,59,48,.1);color:#d63030}
.b-spot{background:rgba(0,122,255,.1);color:#0055cc}
.b-hotel{background:rgba(255,149,0,.1);color:#c07000}
.b-drive{background:rgba(52,199,89,.1);color:#228b40}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--gray4);color:var(--gray)}
.price-tag{font-size:12px;font-weight:700;color:var(--orange);background:rgba(255,149,0,.08);padding:2px 8px;border-radius:5px}

/* ─── tips inside card ─── */
.card-tips{background:#f9f9fb;border-top:.5px solid var(--sep);padding:10px 14px}
.tip-row{display:flex;gap:8px;font-size:12px;color:#555;line-height:1.6;padding:3px 0}
.tip-row .tip-icon{flex-shrink:0;width:18px;text-align:center}

/* ─── action buttons ─── */
.card-actions{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-top:.5px solid var(--sep);background:#fafafa}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;
  font-size:12px;font-weight:700;border:none;cursor:pointer;text-decoration:none;
  -webkit-tap-highlight-color:transparent;transition:filter .15s;letter-spacing:-.01em}
.btn:active{filter:brightness(.88)}
.btn-nav{background:var(--blue);color:#fff}
.btn-xhs{background:#ff2442;color:#fff}
.btn-dp{background:#ffa700;color:#fff}
.btn-meituan{background:#ffd100;color:#333}

/* ─── expand toggle ─── */
.expand-btn{display:flex;align-items:center;justify-content:center;gap:4px;
  padding:9px;border-top:.5px solid var(--sep);background:none;border:none;
  width:100%;font-size:12px;color:var(--gray);cursor:pointer;font-weight:600}
.expand-btn .chevron{transition:transform .25s}
.expand-btn.open .chevron{transform:rotate(180deg)}
.card-detail{display:none;padding:0 14px 12px}
.card-detail.open{display:block}

/* ─── info cards (overview) ─── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 4px}
.ic{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sh)}
.ic .lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ic .val{font-size:14px;font-weight:700;line-height:1.5}
.ic .val small{font-size:12px;font-weight:500;color:var(--gray);display:block;margin-top:1px}

/* ─── overview day cards ─── */
.ov-day{background:var(--card);border-radius:14px;margin:0 14px 8px;
  padding:14px 16px;box-shadow:var(--sh);cursor:pointer;display:flex;align-items:center;gap:12px}
.ov-day:active{opacity:.8}
.ov-day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ov-day-info{flex:1}
.ov-day-label{font-size:15px;font-weight:700;letter-spacing:-.01em}
.ov-day-date{font-size:12px;color:var(--gray);margin-top:2px}
.ov-day-arrow{color:var(--gray2);font-size:16px}

/* ─── alert cards ─── */
.alert{margin:0 14px 8px;border-radius:14px;padding:13px 14px;box-shadow:var(--sh);display:flex;gap:12px;align-items:flex-start}
.alert-icon{font-size:22px;flex-shrink:0;line-height:1}
.alert-body h4{font-size:14px;font-weight:700;margin-bottom:3px}
.alert-body p{font-size:13px;color:var(--gray);line-height:1.6}
.alert-red{background:#fff2f1;border:.5px solid rgba(255,59,48,.2)}
.alert-orange{background:#fff8f0;border:.5px solid rgba(255,149,0,.2)}
.alert-blue{background:#f0f6ff;border:.5px solid rgba(0,122,255,.2)}
.alert-green{background:#f0fbf4;border:.5px solid rgba(52,199,89,.2)}

/* ─── cost table ─── */
.cost-table{margin:0 14px 8px;background:var(--card);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;font-size:13px;border-bottom:.5px solid var(--sep)}
.cost-row:last-child{border-bottom:none;font-weight:700;background:#fafafa}
.cost-row .cost-label{color:var(--gray)}
.cost-row .cost-val{font-weight:600;color:#1d1d1f}

/* ─── packing list ─── */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 14px}
.pack-item{background:var(--card);border-radius:10px;padding:10px 12px;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.pack-item .pack-icon{font-size:18px}

/* ─── action sheet ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:.25s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:420px;padding:0 10px 32px;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.22,1,.36,1)}
.overlay.show .sheet{transform:translateY(0)}
.sg{background:rgba(255,255,255,.92);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);border-radius:16px;overflow:hidden;margin-bottom:8px}
.si{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:17px;font-size:17px;color:var(--blue);font-weight:500;
  border:none;background:none;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent}
.si+.si{border-top:.5px solid rgba(0,0,0,.1)}
.si:active{background:rgba(0,0,0,.05)}
.si-cancel{font-weight:700;color:#1d1d1f}
</style>
</head>
<body>

<div id="root"></div>

  </div>
</div>

//  Canvas 路线地图
// ══════════════════════════════════════════
const DAY_COLORS = {
  1:'#34c759', 2:'#007aff', 3:'#ff9500', 4:'#af52de'
};
const TYPE_BG = {
  food:'#ff3b30', spot:'#007aff', hotel:'#ff9500', drive:'#34c759', spot2:'#30b0c7'
};

function buildMap(dayId){
  const wrap = document.createElement('div');
  wrap.className = 'map-wrap';

  let pts = [];
  if(dayId===0){
    DAYS.forEach(d=>{
      if(!d.locs) return;
      d.locs.forEach(l=>{ if(l.lat) pts.push({...l, color: DAY_COLORS[d.id]||'#888'}); });
    });
  } else {
    const d = DAYS.find(x=>x.id===dayId);
    if(d && d.locs) pts = d.locs.filter(l=>l.lat).map(l=>({...l, color: DAY_COLORS[d.id]||'#888'}));
  }
  if(!pts.length){ wrap.style.display='none'; return wrap; }

  const W=680, H=240;
  const canvas=document.createElement('canvas');
  canvas.width=W*2; canvas.height=H*2;
  canvas.style.height=H+'px';
  wrap.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);

  const lats=pts.map(p=>p.lat), lngs=pts.map(p=>p.lng);
  let minLat=Math.min(...lats), maxLat=Math.max(...lats);
  let minLng=Math.min(...lngs), maxLng=Math.max(...lngs);
  const dLat=(maxLat-minLat)||0.08, dLng=(maxLng-minLng)||0.12;
  const pad=0.14;
  minLat-=dLat*pad; maxLat+=dLat*pad;
  minLng-=dLng*pad; maxLng+=dLng*pad;

  const px=(lat,lng)=>[(lng-minLng)/(maxLng-minLng)*(W-24)+12, (maxLat-lat)/(maxLat-minLat)*(H-28)+14];

  // 背景渐变
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#e8f0eb'); bg.addColorStop(1,'#ddeaf0');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // 网格
  ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=.8;
  for(let i=1;i<6;i++){ const y=H/6*i; ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  for(let i=1;i<12;i++){ const x=W/12*i; ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }

  // 路线
  if(dayId===0){
    // 全程路线按天分段画
    const byDay = {};
    DAYS.forEach(d=>{ if(d.locs) byDay[d.id]=d.locs.filter(l=>l.lat); });
    [1,2,3,4].forEach(did=>{
      const dl=byDay[did]; if(!dl||dl.length<2) return;
      ctx.beginPath(); ctx.setLineDash([6,4]);
      ctx.strokeStyle=(DAY_COLORS[did]||'#aaa')+'bb'; ctx.lineWidth=2;
      const [x0,y0]=px(dl[0].lat,dl[0].lng); ctx.moveTo(x0,y0);
      dl.forEach(l=>{ const [x,y]=px(l.lat,l.lng); ctx.lineTo(x,y); });
      ctx.stroke(); ctx.setLineDash([]);
    });
  } else {
    if(pts.length>1){
      ctx.beginPath(); ctx.setLineDash([6,4]);
      ctx.strokeStyle=pts[0].color+'cc'; ctx.lineWidth=2.5;
      const [x0,y0]=px(pts[0].lat,pts[0].lng); ctx.moveTo(x0,y0);
      pts.forEach(p=>{ const [x,y]=px(p.lat,p.lng); ctx.lineTo(x,y); });
      ctx.stroke(); ctx.setLineDash([]);
    }
  }

  // 标记点
  pts.forEach((p,i)=>{
    const [x,y]=px(p.lat,p.lng);
    const col=p.color||'#888';
    // 外圈光晕
    ctx.beginPath(); ctx.arc(x,y,14,0,Math.PI*2);
    ctx.fillStyle=col+'1a'; ctx.fill();
    // 中圈
    ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fillStyle=col+'33'; ctx.fill();
    // 实心圆
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
    // 序号
    ctx.fillStyle='#fff'; ctx.font='bold 8px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i+1,x,y);
    // 名称标签
    const label=p.name.length>6?p.name.slice(0,5)+'…':p.name;
    ctx.font='600 9.5px -apple-system,sans-serif';
    ctx.fillStyle='rgba(0,0,0,.65)'; ctx.textAlign='center'; ctx.textBaseline='top';
    // 文字背景
    const tw=ctx.measureText(label).width;
    ctx.fillStyle='rgba(255,255,255,.8)';
    ctx.fillRect(x-tw/2-2,y+10,tw+4,13);
    ctx.fillStyle='rgba(0,0,0,.65)';
    ctx.fillText(label,x,y+11);
  });

  // 图例（总览才显示）
  if(dayId===0){
    const leg=[{c:'#34c759',t:'D1'},{c:'#007aff',t:'D2'},{c:'#ff9500',t:'D3'},{c:'#af52de',t:'D4'}];
    let lx=8;
    leg.forEach(({c,t})=>{
      ctx.beginPath(); ctx.arc(lx+5,H-8,5,0,Math.PI*2);
      ctx.fillStyle=c; ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.55)'; ctx.font='600 9px -apple-system,sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(t,lx+13,H-8);
      lx+=30;
    });
  }

  return wrap;
}

function renderCard(loc){
  const id=uid();
  const gmapUrl=loc.gmap?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.gmap)}`:'';
  const amapUrl=loc.lat?`https://uri.amap.com/marker?position=${loc.lng},${loc.lat}&name=${encodeURIComponent(loc.name)}&coordinate=wgs84&callnative=1`:'';

  // action buttons
  let btns='';
  if(loc.lat) btns+=`<button class="btn btn-nav" onclick="openAS('${esc(loc.name)}','${gmapUrl}','${amapUrl}')">📍 导航</button>`;
  if(loc.xhs) btns+=`<a href="https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(loc.xhs)}&source=web_explore_feed" target="_blank" class="btn btn-xhs">📕 小红书</a>`;
  if(loc.dp)  btns+=`<a href="https://m.dianping.com/searchshop?keyword=${encodeURIComponent(loc.dp)}" target="_blank" class="btn btn-dp">🍜 大众点评</a>`;

  // tips
  const tipsHTML=(loc.tips||[]).map(t=>`<div class="tip-row"><span class="tip-icon">${t.icon}</span><span>${t.text}</span></div>`).join('');

  const hasTips=tipsHTML.length>0;

  return `<div class="tl-item">
  <div class="tl-dot" style="background:var(${DOT_COLOR[loc.type]||'--gray'})"></div>
  <div class="card">
    <div class="card-top" onclick="toggleDetail('${id}','${id}b')">
      <div class="card-time">${loc.time}</div>
      <div class="card-name">${BADGE_MAP[loc.type]||''} ${loc.emoji||''} ${loc.name}</div>
      <div class="card-desc">${loc.desc}</div>
      <div class="card-meta">
        ${loc.budget?`<span class="price-tag">💰 ${loc.budget}</span>`:''}
      </div>
    </div>
    ${hasTips?`<div class="card-tips" id="${id}">${tipsHTML}</div>`:''}
    ${btns?`<div class="card-actions">${btns}</div>`:''}
  </div>
</div>`;
}

// ══════════════════════════════════════════
//  导航 & 交互
// ══════════════════════════════════════════
let curDay=0;
const tabsEl=document.getElementById('tabs');
const rootEl=document.getElementById('root');

DAYS.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='tab'+(d.id===0?' active':'');
  btn.style.setProperty('--c', d.color||'#007aff');
  btn.dataset.day=d.id;
  btn.textContent=d.label;
  tabsEl.appendChild(btn);
});
tabsEl.addEventListener('click',e=>{
  const t=e.target.closest('.tab');
  if(t) go(+t.dataset.day);
});

// 给 tab 设置 active 颜色
function updateTabColors(idx){
  tabsEl.querySelectorAll('.tab').forEach(t=>{
    const active=+t.dataset.day===idx;
    t.classList.toggle('active',active);
    if(active){
      const d=DAYS.find(x=>x.id===idx);
      t.style.background=d?d.color:'#007aff';
    } else {
      t.style.background='';
    }
  });
}

function go(idx){
  curDay=idx;
  updateTabColors(idx);

  rootEl.innerHTML='';

  const d=DAYS.find(x=>x.id===idx);
  const div=document.createElement('div');
  div.innerHTML=idx===0?overviewHTML():dayHTML(d);
  rootEl.appendChild(div);

  // 每日页：在 day-intro 后插入地图
  if(idx!==0){
    const intro=div.querySelector('.day-intro');
    if(intro) intro.after(buildMap(idx));
  } else {
    // 总览页：插入到"全程路线图"sec 之后
    const secs=div.querySelectorAll('.sec');
    const routeSec=[...secs].find(s=>s.textContent.includes('全程路线图'));
    if(routeSec) routeSec.after(buildMap(0));
  }

  window.scrollTo({top:0,behavior:'smooth'});
  const tab=tabsEl.querySelector(`[data-day="${idx}"]`);
  if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// Action Sheet
const overlay=document.getElementById('overlay');
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeAS(); });

function openAS(name,gmap,amap){
  const apple=`https://maps.apple.com/?q=${encodeURIComponent(name)}`;
  document.getElementById('as-opts').innerHTML=
    `<button class="si" onclick="open2('${apple}')">🍎 Apple Maps</button>`+
    (gmap?`<button class="si" onclick="open2('${gmap}')">🗺️ Google Maps</button>`:'')+
    (amap?`<button class="si" onclick="open2('${amap}')">🧭 高德地图</button>`:'');
  overlay.classList.add('show');
}
function open2(url){ window.open(url,'_blank'); closeAS(); }
function closeAS(){ overlay.classList.remove('show'); }

go(0);
</script>
